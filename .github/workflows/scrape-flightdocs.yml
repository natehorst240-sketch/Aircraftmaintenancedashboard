name: FlightDocs Daily Sync

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install scraper runtime tools
        run: npm install --no-save tsx playwright xlsx

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run FlightDocs scraper
        env:
          FLIGHTDOCS_USERNAME: ${{ secrets.FLIGHTDOCS_USERNAME }}
          FLIGHTDOCS_PASSWORD: ${{ secrets.FLIGHTDOCS_PASSWORD }}
        run: |
          set -euo pipefail

          commands=(
            "node --import=tsx src/imports/flightdocs-scraper.ts"
            "npx --yes tsx src/imports/flightdocs-scraper.ts"
          )

          for cmd in "${commands[@]}"; do
            echo "Attempting scraper command: ${cmd}"
            if eval "${cmd}"; then
              echo "Scraper succeeded with command: ${cmd}"
              exit 0
            fi
            echo "Scraper command failed, trying next option..."
          done

          echo "All scraper launch commands failed."
          exit 1

      - name: Commit updated CSV (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/due-list.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(data): update FlightDocs due-list CSV"
          git push
